<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InsightEngine | Daily Intel</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: rgba(30, 41, 59, 0.7);
            --accent-color: #38bdf8;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --glass-border: rgba(255, 255, 255, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            line-height: 1.6;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 50px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .section-label {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-secondary);
            margin-bottom: 15px;
            margin-top: 30px;
            font-weight: 600;
        }

        .filters {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-secondary);
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.9rem;
        }

        .filter-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
            border-color: var(--accent-color);
            font-weight: 600;
        }

        .insights-grid {
            display: grid;
            gap: 20px;
        }

        .insight-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 25px;
            border-radius: 16px;
            position: relative;
            transition: transform 0.3s ease, border-color 0.3s ease;
            animation: slideUp 0.5s ease forwards;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .insight-card:hover {
            transform: translateY(-5px);
            border-color: rgba(56, 189, 248, 0.4);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 15px;
        }

        .source-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-color);
            margin-bottom: 5px;
            display: block;
        }

        .title {
            font-size: 1.4rem;
            font-weight: 600;
            color: var(--text-primary);
            text-decoration: none;
            display: block;
            margin-bottom: 10px;
        }

        .title:hover {
            color: var(--accent-color);
        }

        .summary {
            color: var(--text-secondary);
            font-size: 1rem;
            margin-bottom: 20px;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .metadata {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .score-badge {
            padding: 4px 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 0.85rem;
        }

        .score-high { background: rgba(34, 197, 94, 0.2); color: #4ade80; }
        .score-mid { background: rgba(234, 179, 8, 0.2); color: #facc15; }
        .score-low { background: rgba(239, 68, 68, 0.2); color: #f87171; }

        .btn-read {
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 0.85rem;
        }

        .btn-read:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .fade-out {
            opacity: 0;
            transform: scale(0.9);
            transition: all 0.4s ease;
        }

        #empty-state {
            text-align: center;
            padding: 100px 0;
            color: var(--text-secondary);
        }
        .nav-tabs {
            display: flex;
            gap: 10px;
            background: var(--card-bg);
            padding: 5px;
            border-radius: 12px;
            border: 1px solid var(--glass-border);
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 20px;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: inherit;
            font-weight: 600;
        }

        .tab-btn.active {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .settings-panel {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            padding: 30px;
            border-radius: 16px;
            margin-top: 20px;
        }

        .form-group {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .form-group input, .form-group select {
            background: rgba(15, 23, 42, 0.5);
            border: 1px solid var(--glass-border);
            color: white;
            padding: 10px;
            border-radius: 8px;
            flex-grow: 1;
            font-family: inherit;
        }

        .source-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            border-bottom: 1px solid var(--glass-border);
        }

        .source-item:last-child { border-bottom: none; }

        .btn-delete {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-delete:hover {
            background: #ef4444;
            color: white;
        }

        .btn-edit {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(56, 189, 248, 0.2);
            padding: 5px 12px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-right: 5px;
        }

        .btn-edit:hover {
            background: var(--accent-color);
            color: var(--bg-color);
        }

        .edit-form {
            background: rgba(15, 23, 42, 0.3);
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            display: none;
        }

        .count-badge {
            background: rgba(56, 189, 248, 0.1);
            color: var(--accent-color);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            margin-left: 10px;
        }

        .settings-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .spinner {
            display: inline-block;
            width: 12px;
            height: 12px;
            border: 2px solid rgba(56, 189, 248, 0.3);
            border-radius: 50%;
            border-top-color: var(--accent-color);
            animation: spin 1s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Summary Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(8px);
            z-index: 1000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .modal-content {
            background: #1e293b;
            border: 1px solid var(--glass-border);
            border-radius: 24px;
            width: 100%;
            max-width: 800px;
            max-height: 85vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 20px;
            background: transparent;
            border: none;
            color: var(--text-secondary);
            font-size: 1.5rem;
            cursor: pointer;
        }

        .summary-section {
            margin-bottom: 30px;
        }

        .summary-section h2 {
            font-size: 1.8rem;
            margin-bottom: 15px;
            color: var(--accent-color);
        }

        .summary-section h3 {
            font-size: 1.2rem;
            margin-top: 25px;
            margin-bottom: 10px;
            color: var(--text-primary);
            border-left: 4px solid var(--accent-color);
            padding-left: 15px;
        }

        .summary-text {
            color: var(--text-secondary);
            white-space: pre-wrap;
            line-height: 1.8;
        }

        .btn-summary {
            background: linear-gradient(to right, #818cf8, #38bdf8);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .btn-summary:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.4);
        }

        .btn-summary:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        /* Summary Tab Styles */
        .summary-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 1px solid var(--glass-border);
            padding-bottom: 10px;
            overflow-x: auto;
        }

        .summary-tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 8px 16px;
            cursor: pointer;
            font-family: inherit;
            font-weight: 600;
            white-space: nowrap;
            transition: all 0.3s ease;
            border-radius: 8px;
        }

        .summary-tab-btn.active {
            color: var(--accent-color);
            background: rgba(56, 189, 248, 0.1);
        }

        .summary-content-pane {
            display: none;
            animation: fadeIn 0.4s ease;
        }

        .summary-content-pane.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        /* Better formatting for AI content */
        .summary-text {
            color: var(--text-secondary);
            white-space: pre-wrap;
            line-height: 1.8;
            font-size: 1.1rem;
        }

        .summary-text ul {
            margin-left: 20px;
            margin-bottom: 20px;
        }

        .summary-text h3 {
            color: var(--text-primary);
            margin-top: 30px;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>InsightEngine</h1>
            <div class="nav-tabs">
                <button class="tab-btn active" onclick="showTab('dashboard')">Dashboard</button>
                <button class="tab-btn" onclick="showTab('settings')">Settings</button>
            </div>
        </header>

        <!-- DASHBOARD TAB -->
        <div id="tab-dashboard">
            <div class="dashboard-header">
                <div class="metadata" id="stats">Loading intel...</div>
                <div style="display: flex; gap: 10px;">
                    <button id="summary-btn" class="btn-summary" onclick="generateSummary()">
                        ✨ Resumo do Dia
                    </button>
                    <button id="refresh-btn" class="btn-read" onclick="runPipeline()">Update Intel</button>
                </div>
            </div>
            
            <div id="pipeline-loader" style="display: none; margin-bottom: 20px; color: var(--accent-color); font-size: 0.9rem;">
                <span class="spinner"></span> Refining content with Llama 3...
            </div>

            <div class="section-label">Order</div>
            <div class="filters" id="sort-filters">
                <button class="filter-btn" onclick="setSort('top')">Top Insights</button>
                <button class="filter-btn" onclick="setSort('recent')">Latest Arrivals</button>
            </div>

            <div class="section-label">Topics</div>
            <div class="filters" id="category-filters">
                <!-- Category buttons will be injected here -->
            </div>

            <div class="section-label">Sources</div>
            <div class="filters" id="source-chips">
                <!-- Source chips will be injected here -->
            </div>

            <div id="insights-grid" class="insights-grid">
                <!-- Cards will be injected here -->
            </div>
        </div>

        <!-- SETTINGS TAB -->
        <div id="tab-settings" style="display: none;">
            <div class="settings-panel">
                <h3>Add New Source</h3>
                <div class="form-group">
                    <input type="text" id="new-url" placeholder="URL (RSS or YouTube Channel)">
                    <select id="new-type">
                        <option value="RSS">RSS</option>
                        <option value="YouTube">YouTube</option>
                        <option value="Scraper">Web Scraper (No RSS)</option>
                        <option value="GitHub">GitHub Trending</option>
                    </select>
                    <input type="text" id="new-category" placeholder="Category (Finance, Games, etc.)" style="max-width: 150px;">
                    <input type="number" id="new-limit" value="10" min="1" max="50" style="max-width: 80px;" title="Item limit">
                    <button class="btn-read" onclick="addNewSource()">Add Source</button>
                </div>
                
                <div class="settings-header" style="margin-top: 40px;">
                    <h3>Current Sources</h3>
                    <button class="btn-read" onclick="runPipeline()" id="refresh-btn-settings">Update All Sources</button>
                </div>
                <div id="sources-list" class="sources-list">
                    <!-- List of sources with delete buttons -->
                </div>
            </div>
        </div>

        <div id="empty-state" style="display: none;">
            <h2>All caught up!</h2>
            <p>No new insights found. Run the pipeline to refresh.</p>
        </div>
    </div>

    <script>
        let allInsights = [];
        let currentCategory = 'all';
        let currentSource = 'all';
        let currentSort = localStorage.getItem('insightSort') || 'top';

        async function loadInsights() {
            try {
                const response = await fetch('/api/insights');
                allInsights = await response.json();
                renderCategoryFilters();
                renderSourceChips();
                updateActiveButtons('sort-filters', currentSort === 'top' ? 'Top Insights' : 'Latest Arrivals');
                applyFilters();
                updateStats();
            } catch (error) {
                console.error("Error loading insights:", error);
            }
        }

        async function loadSources() {
            try {
                const response = await fetch('/api/sources');
                const sources = await response.json();
                const container = document.getElementById('sources-list');
                container.innerHTML = '';
                
                sources.forEach(s => {
                    const item = document.createElement('div');
                    item.className = 'source-container';
                    item.innerHTML = `
                        <div class="source-item" id="source-${s.id}">
                            <div>
                                <strong>[${s.category}]</strong> ${s.name || s.url} 
                                <span class="count-badge">${s.article_count} items</span>
                                <br>
                                <small style="color: var(--text-secondary)">${s.url} (${s.type} • Limit: ${s.item_limit})</small>
                            </div>
                            <div>
                                <button class="btn-edit" onclick="toggleEdit(${s.id})">Edit</button>
                                <button class="btn-delete" onclick="removeSource(${s.id})">Delete</button>
                            </div>
                        </div>
                        <div class="edit-form" id="edit-${s.id}">
                            <div class="form-group" style="margin-top: 0;">
                                <input type="text" id="edit-url-${s.id}" value="${s.url}" placeholder="URL">
                                <select id="edit-type-${s.id}">
                                    <option value="RSS" ${s.type === 'RSS' ? 'selected' : ''}>RSS</option>
                                    <option value="YouTube" ${s.type === 'YouTube' ? 'selected' : ''}>YouTube</option>
                                    <option value="Scraper" ${s.type === 'Scraper' ? 'selected' : ''}>Web Scraper</option>
                                    <option value="GitHub" ${s.type === 'GitHub' ? 'selected' : ''}>GitHub</option>
                                </select>
                            </div>
                            <div class="form-group">
                                <input type="text" id="edit-category-${s.id}" value="${s.category}" placeholder="Category">
                                <input type="number" id="edit-limit-${s.id}" value="${s.item_limit}" title="Per-run limit">
                                <button class="btn-read" onclick="saveEdit(${s.id})">Save</button>
                                <button class="filter-btn" onclick="toggleEdit(${s.id})">Cancel</button>
                            </div>
                        </div>
                    `;
                    container.appendChild(item);
                });
            } catch (error) {
                console.error("Error loading sources:", error);
            }
        }

        async function addNewSource() {
            const url = document.getElementById('new-url').value;
            const type = document.getElementById('new-type').value;
            const category = document.getElementById('new-category').value || 'General';
            const limit = document.getElementById('new-limit').value || 10;
            
            if (!url) return alert("Please enter a URL");

            await fetch('/api/sources', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, type, category, limit })
            });
            
            document.getElementById('new-url').value = '';
            document.getElementById('new-category').value = '';
            document.getElementById('new-limit').value = 10;
            loadSources();
        }

        async function removeSource(id) {
            if (!confirm("Remove this source?")) return;
            await fetch(`/api/sources/delete/${id}`, { method: 'POST' });
            loadSources();
        }

        function toggleEdit(id) {
            const item = document.getElementById(`source-${id}`);
            const form = document.getElementById(`edit-${id}`);
            const isEditing = form.style.display === 'block';
            
            form.style.display = isEditing ? 'none' : 'block';
            item.style.display = isEditing ? 'flex' : 'none';
        }

        async function saveEdit(id) {
            const url = document.getElementById(`edit-url-${id}`).value;
            const type = document.getElementById(`edit-type-${id}`).value;
            const category = document.getElementById(`edit-category-${id}`).value;
            const limit = document.getElementById(`edit-limit-${id}`).value;
            
            await fetch(`/api/sources/update/${id}`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ url, type, category, item_limit: limit })
            });
            
            loadSources();
        }

        function showTab(tab) {
            document.getElementById('tab-dashboard').style.display = tab === 'dashboard' ? 'block' : 'none';
            document.getElementById('tab-settings').style.display = tab === 'settings' ? 'block' : 'none';
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.toggle('active', btn.innerText.toLowerCase() === tab);
            });
            
            if (tab === 'settings') loadSources();
            if (tab === 'dashboard') loadInsights();
        }

        function renderSourceChips() {
            const container = document.getElementById('source-chips');
            const sources = [...new Set(allInsights.map(i => i.source))].sort();
            
            container.innerHTML = `<button class="filter-btn ${currentSource === 'all' ? 'active' : ''}" onclick="filterBySource('all')">All Sources</button>`;
            
            sources.forEach(source => {
                const isActive = currentSource === source ? 'active' : '';
                container.innerHTML += `<button class="filter-btn ${isActive}" onclick="filterBySource('${source.replace(/'/g, "\\'")}')">${source}</button>`;
            });
        }

        function renderInsights(data) {
            const grid = document.getElementById('insights-grid');
            const emptyState = document.getElementById('empty-state');
            
            grid.innerHTML = '';
            
            if (data.length === 0) {
                if (currentType === 'all' && currentSource === 'all') {
                    emptyState.style.display = 'block';
                }
                return;
            } else {
                emptyState.style.display = 'none';
            }

            data.forEach(item => {
                const scoreClass = item.relevance_score >= 8 ? 'score-high' : (item.relevance_score >= 5 ? 'score-mid' : 'score-low');
                
                const card = document.createElement('div');
                card.className = 'insight-card';
                card.id = `insight-${item.id}`;
                card.innerHTML = `
                    <span class="source-tag">${item.source}</span>
                    <a href="${item.url}" target="_blank" class="title">${item.title}</a>
                    <p class="summary">${item.summary}</p>
                    <div class="card-footer">
                        <div class="metadata">
                            <span class="score-badge ${scoreClass}">${item.relevance_score}/10</span>
                            &nbsp; • &nbsp; ${item.published_at}
                        </div>
                        <button class="btn-read" onclick="markRead(${item.id})">Mark as Read</button>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        async function markRead(id) {
            const card = document.getElementById(`insight-${id}`);
            card.classList.add('fade-out');
            
            setTimeout(async () => {
                await fetch(`/api/read/${id}`, { method: 'POST' });
                allInsights = allInsights.filter(i => i.id !== id);
                card.remove();
                renderSourceChips();
                updateStats();
                if (allInsights.length === 0) {
                    document.getElementById('empty-state').style.display = 'block';
                }
            }, 400);
        }

        function renderCategoryFilters() {
            const container = document.getElementById('category-filters');
            const categories = [...new Set(allInsights.map(i => i.category))].sort();
            
            container.innerHTML = `<button class="filter-btn ${currentCategory === 'all' ? 'active' : ''}" onclick="filterByCategory('all')">All Topics</button>`;
            
            categories.forEach(cat => {
                const isActive = currentCategory === cat ? 'active' : '';
                container.innerHTML += `<button class="filter-btn ${isActive}" onclick="filterByCategory('${cat}')">${cat}</button>`;
            });
        }

        function filterByCategory(cat) {
            currentCategory = cat;
            currentSource = 'all';
            updateActiveButtons('category-filters', cat === 'all' ? 'All Topics' : cat);
            renderSourceChips();
            applyFilters();
        }

        function filterBySource(source) {
            currentSource = source;
            updateActiveButtons('source-chips', source === 'all' ? 'All Sources' : source);
            applyFilters();
        }

        function setSort(sort) {
            currentSort = sort;
            localStorage.setItem('insightSort', sort);
            updateActiveButtons('sort-filters', sort === 'top' ? 'Top Insights' : 'Latest Arrivals');
            applyFilters();
        }

        function applyFilters() {
            let filtered = [...allInsights];
            if (currentCategory !== 'all') filtered = filtered.filter(i => i.category === currentCategory);
            if (currentSource !== 'all') filtered = filtered.filter(i => i.source === currentSource);
            
            // Apply sorting
            if (currentSort === 'top') {
                filtered.sort((a, b) => {
                    if (b.relevance_score !== a.relevance_score) return b.relevance_score - a.relevance_score;
                    return new Date(b.created_at) - new Date(a.created_at);
                });
            } else {
                filtered.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            }
            
            renderInsights(filtered);
        }

        function updateActiveButtons(containerId, activeText) {
            document.querySelectorAll(`#${containerId} .filter-btn`).forEach(btn => {
                btn.classList.remove('active');
                if (btn.innerText === activeText) btn.classList.add('active');
            });
        }

        function updateStats() {
            const stats = document.getElementById('stats');
            if (stats) stats.innerText = `${allInsights.length} Unread Insights`;
        }

        async function runPipeline() {
            const btn = document.getElementById('refresh-btn');
            btn.disabled = true;
            btn.innerText = 'Starting...';
            
            await fetch('/api/pipeline/run', { method: 'POST' });
            checkPipelineStatus();
        }

        async function checkPipelineStatus() {
            const response = await fetch('/api/pipeline/status');
            const status = await response.json();
            
            const loader = document.getElementById('pipeline-loader');
            const btnDash = document.getElementById('refresh-btn');
            const btnSettings = document.getElementById('refresh-btn-settings');
            
            if (status.running) {
                loader.style.display = 'block';
                if (btnDash) {
                    btnDash.disabled = true;
                    btnDash.innerText = 'Updating...';
                }
                if (btnSettings) {
                    btnSettings.disabled = true;
                    btnSettings.innerText = 'Updating...';
                }
                // Poll again in 5s
                setTimeout(checkPipelineStatus, 5000);
            } else {
                loader.style.display = 'none';
                if (btnDash) {
                    btnDash.disabled = false;
                    btnDash.innerText = 'Update Intel';
                }
                if (btnSettings) {
                    btnSettings.disabled = false;
                    btnSettings.innerText = 'Update All Sources';
                }
                // If it just stopped, refresh the list
                loadInsights();
                loadSources();
            }
        }

        // Initial Load
        loadInsights();
        checkPipelineStatus();

        async function generateSummary() {
            const btn = document.getElementById('summary-btn');
            const overlay = document.getElementById('summary-modal');
            const content = document.getElementById('summary-content');
            
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Analisando...';
            
            try {
                const response = await fetch('/api/summary/daily');
                const data = await response.json();
                
                let tabsHtml = `<div class="summary-tabs">`;
                tabsHtml += `<button class="summary-tab-btn active" onclick="switchSummaryTab('general')">Geral</button>`;
                
                let contentHtml = `
                    <div id="summary-pane-general" class="summary-content-pane active">
                        <div class="summary-section">
                            <h2>Síntese Executiva Global</h2>
                            <div class="summary-text">${formatMarkdown(data.global)}</div>
                        </div>
                    </div>
                `;
                
                for (const [cat, text] of Object.entries(data.categories)) {
                    const tabId = cat.toLowerCase().replace(/\s+/g, '-');
                    tabsHtml += `<button class="summary-tab-btn" onclick="switchSummaryTab('${tabId}')">${cat}</button>`;
                    contentHtml += `
                        <div id="summary-pane-${tabId}" class="summary-content-pane">
                            <div class="summary-section">
                                <h2>Relatório: ${cat}</h2>
                                <div class="summary-text">${formatMarkdown(text)}</div>
                            </div>
                        </div>
                    `;
                }
                
                tabsHtml += `</div>`;
                content.innerHTML = tabsHtml + contentHtml;
                overlay.style.display = 'flex';
            } catch (error) {
                alert("Erro ao gerar resumo. Verifique se o Ollama está rodando.");
                console.error(error);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '✨ Resumo do Dia';
            }
        }

        function formatMarkdown(text) {
            // Simple markdown-ish formatting for bullet points and headers
            return text
                .replace(/^### (.*$)/gim, '<h3>$1</h3>')
                .replace(/^## (.*$)/gim, '<h2>$1</h2>')
                .replace(/^- (.*$)/gim, '<li>$1</li>')
                .replace(/(<li>.*<\/li>)/gms, '<ul>$1</ul>')
                .replace(/\n\n/g, '<br><br>');
        }

        function switchSummaryTab(tabId) {
            document.querySelectorAll('.summary-content-pane').forEach(pane => {
                pane.classList.remove('active');
            });
            document.querySelectorAll('.summary-tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(`summary-pane-${tabId}`).classList.add('active');
            // Find button by onclick
            document.querySelectorAll('.summary-tab-btn').forEach(btn => {
                if (btn.getAttribute('onclick').includes(`'${tabId}'`)) {
                    btn.classList.add('active');
                }
            });
        }

        function closeSummary() {
            document.getElementById('summary-modal').style.display = 'none';
        }

        // Close modal on click outside
        window.onclick = function(event) {
            const modal = document.getElementById('summary-modal');
            if (event.target == modal) {
                closeSummary();
            }
        }
    </script>

    <!-- Summary Modal -->
    <div id="summary-modal" class="modal-overlay">
        <div class="modal-content">
            <button class="modal-close" onclick="closeSummary()">&times;</button>
            <div id="summary-content">
                <!-- AI Content injected here -->
            </div>
        </div>
    </div>
</body>
</html>
